
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">

  <title>MIR + MNE</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>MIR + MNE</h1>

  <!-----------------------------------
  NOME
  ------------------------------------>

  <input
    type="text"
    id="nome"
    placeholder="Nome"
  >

  <!-----------------------------------
  SOBRENOME
  ------------------------------------>

  <input
    type="text"
    id="sobrenome"
    placeholder="Sobrenome"
  >

  <!-----------------------------------
  CEP + VIA CEP
  ------------------------------------>

  <input
    type="text"
    id="cep"
    placeholder="CEP"
    onblur="buscarCEP()"
  >

  <!-----------------------------------
  RUA
  ------------------------------------>

  <input
    type="text"
    id="rua"
    placeholder="Rua"
  >

  <!-----------------------------------
  CASA
  ------------------------------------>

  <input
    type="text"
    id="casa"
    placeholder="Número da Casa"
  >

  <!-----------------------------------
  CIDADE
  ------------------------------------>

  <input
    type="text"
    id="cidade"
    placeholder="Cidade"
  >

  <!-----------------------------------
  CPF + GERADOR
  ------------------------------------>

  <div
    class="cpf-container"
    style="margin-top:10px;"
  >

    <input
      type="text"
      id="cpf"
      placeholder="CPF"
    >

    <button onclick="gerarCPF()">
      Gerar CPF
    </button>

  </div>

  <br><br>

  <!-----------------------------------
  BOTÕES
  ------------------------------------>

  <button onclick="cadastrar()">
    Cadastrar
  </button>

  <button onclick="estatisticas()">
    Ver Estatísticas
  </button>

  <button onclick="listar()">
    Listar Registros MIR
  </button>

  <hr>

  <div class="dashboard">

    <canvas id="graficoBytes"></canvas>

    <canvas id="graficoEconomia"></canvas>

  </div>

  <!-----------------------------------
  RESULTADO
  ------------------------------------>

  <div id="resultado"></div>

  <!-----------------------------------
  ESTATÍSTICAS
  ------------------------------------>

  <pre id="stats"></pre>

  <!-----------------------------------
  LISTAGEM
  ------------------------------------>

  <h2>Listagem MIR</h2>

  <div id="tempo"></div>

  <div id="lista"></div>

  <!-----------------------------------
  SCRIPT
  ------------------------------------>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js" integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ" crossorigin="anonymous"></script>

</body>

</html>
